<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Option Max Pain Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; }
        .container { max-width: 900px; }
        .card { border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .chart-container { margin-top: 30px; background: white; padding: 20px; border-radius: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card p-4">
        <h2 class="text-center mb-4">Max Pain Forward Curve</h2>
        <form method="POST" class="row g-3 justify-content-center">
            <div class="col-auto">
                <input type="text" name="symbol" class="form-control form-control-lg" placeholder="Enter Ticker (e.g. SPY)" value="{{ symbol }}" required>
            </div>
            <div class="col-auto">
                <button type="submit" class="btn btn-primary btn-lg">Analyze</button>
            </div>
        </form>

        {% if error %}
        <div class="alert alert-danger mt-4">{{ error }}</div>
        {% endif %}
    </div>

    {% if chart_html %}
    <div class="chart-container shadow">
        {{ chart_html | safe }}
    </div>
    <div class="mt-3 text-muted small text-center">
        <p><strong>Max Pain Theory:</strong> Suggests that the stock price will gravitate towards the strike price where the most option buyers (calls and puts) will expire worthless.</p>
    </div>
    {% endif %}
</div>

</body>
</html>
